<!DOCTYPE html>
<html>
  <head>
    <title>SmartChakkii AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      // This custom component handles the play/pause logic
      AFRAME.registerComponent('vidhandler', {
        init: function () {
          this.toggle = false;
          this.vid = document.querySelector("#arVideo");
          this.vid.pause(); // Ensure it starts paused
        },
        tick: function () {
          if (this.el.object3D.visible == true) {
            if (!this.toggle) {
              this.toggle = true;
              this.vid.play();
            }
          } else {
            this.toggle = false;
            this.vid.pause();
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <video id="arVideo" 
               src="smartchakkii.mp4" 
               preload="auto" 
               loop="true" 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline>
        </video>
      </a-assets>

      <a-marker type="pattern" url="pattern-trigger-image.patt" vidhandler>
        <a-video src="#arVideo" width="1.6" height="0.9" rotation="-90 0 0" position="0 0 0"></a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
